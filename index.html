<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnlATV_BD - Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        .dashboard-header { text-align: center; margin: 4rem 0 3rem; }
        .dashboard-header h1 {
            font-weight: 800;
            font-size: 3rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, var(--text-primary), var(--accent-cyan));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .dashboard-header p { color: var(--text-secondary); font-size: 1.2rem; }
        .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; }
        .dash-card { display: block; text-decoration: none; color: inherit; transition: transform 0.2s, border-color 0.2s; }
        .dash-card article { text-align: center; padding: 2.5rem 1rem; border: none; }
        .dash-card:hover { transform: translateY(-5px); }
        .dash-card:hover article { border-color: var(--accent-cyan); }
        .dash-card.primary article {
            background: linear-gradient(155deg, rgba(34,211,238,0.16), rgba(167,139,250,0.10));
            border: 1px solid var(--accent-cyan);
        }
        .dash-card.primary article h3, .dash-card.primary article p { color: var(--text-primary); }
        .icon { font-size: 3rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
    <main class="container">
        <header class="dashboard-header">
            <h1>Analytics Hub</h1>
            <p>Sistema de Gerenciamento de Pesquisa e Dados</p>
        </header>

        <div class="grid-cards">
            <a href="dashboard.html" class="dash-card primary card">
                <article>
                    <span class="icon">📊</span>
                    <h3>Dashboard</h3>
                    <p>Métricas, gráficos e nuvem de palavras-chave</p>
                </article>
            </a>
            <a href="artigos.html" class="dash-card card">
                <article>
                    <span class="icon">📄</span>
                    <h3>Artigos</h3>
                    <p>Gerenciar publicações</p>
                </article>
            </a>
            <a href="autores.html" class="dash-card card">
                <article>
                    <span class="icon">👥</span>
                    <h3>Autores</h3>
                    <p>Banco de pesquisadores</p>
                </article>
            </a>
            <a href="palavras-chave.html" class="dash-card card">
                <article>
                    <span class="icon">🎯</span>
                    <h3>Palavras-chave</h3>
                    <p>Ranking e tendências</p>
                </article>
            </a>
            <a href="importar.html" class="dash-card card">
                <article>
                    <span class="icon">☁️</span>
                    <h3>Importar Dados</h3>
                    <p>Carga via CSV do Scopus</p>
                </article>
            </a>
        </div>
    </main>
</body>
</html>
