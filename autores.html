<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Autores</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <nav class="container top-nav">
        <ul>
            <li><strong>📊 Science Base</strong></li>
            <li><a href="index.html">Início</a></li>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="artigos.html">Artigos</a></li>
            <li><a href="autores.html" style="color: var(--accent-cyan)">Autores</a></li>
            <li><a href="palavras-chave.html">Palavras-chave</a></li>
            <li><a href="importar.html">Importar</a></li>
        </ul>
    </nav>

    <main class="container">
        <h1>✍️ Banco de Autores</h1>
        <p style="color: var(--text-secondary);">Pesquisadores extraídos da base de dados.</p>

        <div class="card" style="padding: 0; overflow: hidden;">
            <table class="striped" style="margin: 0;">
                <thead>
                    <tr><th>Scopus ID</th><th>Nome Curto</th><th>Nome Completo</th></tr>
                </thead>
                <tbody id="lista-autores">
                    <tr><td colspan="3" aria-busy="true">Carregando autores...</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script type="module">
        import { supabaseClient } from './supabase-client.js';

        async function loadAuthors() {
            // Busca todos os autores
            const { data: authors, error } = await supabaseClient.from('Author').select('*').order('Name', { ascending: true });

            const tbody = document.getElementById('lista-autores');
            tbody.innerHTML = '';

            if (error || !authors || authors.length === 0) {
                tbody.innerHTML = '<tr><td colspan="3">Nenhum autor encontrado. Importe um CSV primeiro.</td></tr>';
                return;
            }

            authors.forEach((author) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td><code>${author.ID}</code></td><td>${author.Name || '-'}</td><td>${author.Full_Name || '-'}</td>`;
                tbody.appendChild(tr);
            });
        }
        loadAuthors();
    </script>
</body>
</html>
